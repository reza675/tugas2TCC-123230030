<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aplikasi Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div>
          <h1>Notebook Harian</h1>
          <p>Simpan ide, tugas, dan catatan pentingmu dalam satu tempat.</p>
        </div>
      </header>

      <section class="panel form-panel">
        <form id="note-form">
          <div class="field">
            <label for="judul">Judul</label>
            <input
              id="judul"
              data-id=""
              type="text"
              placeholder="Contoh: Algoritma Pemrograman"
              required
            />
          </div>

          <div class="field">
            <label for="isi">Isi Catatan</label>
            <textarea
              id="isi"
              placeholder="Tulis poin penting yang ingin diingat..."
              required
            ></textarea>
          </div>

          <div class="form-actions">
            <button type="submit">Simpan Catatan</button>
            <button id="btn-batal" type="button">Batal Edit</button>
          </div>
        </form>
      </section>

      <p id="status" aria-live="polite"></p>

      <main class="panel table-panel">
        <div class="table-head">
          <h2>Daftar Catatan</h2>
          <span class="empty-hint">Klik Edit untuk memperbarui catatan</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>Judul</th>
                <th>Isi</th>
                <th>Tanggal Dibuat</th>
                <th colspan="2">Opsi</th>
              </tr>
            </thead>
            <tbody id="table-note"></tbody>
          </table>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="index.js"></script>
  </body>
</html>
